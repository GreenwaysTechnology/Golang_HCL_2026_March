syntax = "proto3";

package greet.v1;

option go_package = "github.com/youruser/grpc-buf-example/gen/greet/v1;greetv1";

service GreetService {
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse);
}

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string greeting = 1;
}